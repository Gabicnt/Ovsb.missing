name: ovsbmissing
description: OvsbMissing - Gerenciador Inteligente de Faltas Escolares.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # HTTP & APIs
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  
  # Date handling
  intl: ^0.18.1
  
  # Google Services (opcional)
  google_sign_in: ^6.1.6
  googleapis: ^12.0.0
  googleapis_auth: ^1.4.1
  
  # UI Components
  table_calendar: ^3.0.9
  
  # Icons (substituído – compatível com Flutter atual)
  phosphoricons_flutter: ^1.0.0
  
  # PDF Export
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # File handling
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  
  # Fonts
  google_fonts: ^6.1.0
  
  # URL Launcher
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
