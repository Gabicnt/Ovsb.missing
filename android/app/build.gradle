plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.ovsbmissing.app"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        // Ativa o desugaring (necessário para flutter_local_notifications)
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.ovsbmissing.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // Para testes. Em produção, configure a assinatura.
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Esta dependência é obrigatória para o desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}